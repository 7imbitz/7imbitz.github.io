<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVSS Calculator v4.0 - Base Score</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CVSS Version 4.0 Base Score Calculator with visual icons"/>
    <link rel="stylesheet" href="cvss.css">
    <script src="icons.js"></script>
    <script src="cvss.js"></script>
    <style>
        body { background: #e0e4e4; font-family: arial, sans-serif; padding: 1em; text-align: center; }
        h3 { color: #555; margin: 0 0 10px; font-size: 18px; }
        #footer { font-size: x-small; color: gray; margin-top: 12px; }
        .back-link { position: absolute; top: 1em; left: 1.5em; font-size: small; color: #489; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="/" class="back-link">&larr; 7imbitz's Blog</a>
    <h3>CVSS v4.0 Base Score Calculator</h3>
    <div class="cvssjs" id="cvssboard"></div>
    <footer id="footer">
        Adapted from <a href="https://github.com/cvssjs">CVSSjs</a> by Chandan B.N. &middot;
        CVSS is owned by <a href="https://www.first.org/cvss">FIRST.Org</a>.
    </footer>
    <script>
        var c = new CVSS("cvssboard", {
            onchange: function() {
                window.location.hash = c.get().vector;
                c.vector.setAttribute('href', '#' + c.get().vector);
            }
        });
        if (window.location.hash.substring(1).length > 0) {
            c.set(decodeURIComponent(window.location.hash.substring(1)));
        }
    </script>
</body>
</html>
